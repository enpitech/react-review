name: Claude Code Review

on:
  # pull_request:
  #   types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       (contains(github.event.comment.body, '/cr-react') ||
        contains(github.event.comment.body, '/cr-node') ||
        contains(github.event.comment.body, '/cr-python') ||
        contains(github.event.comment.body, '/cr-general') ||
        contains(github.event.comment.body, '/cr-deps') ||
        contains(github.event.comment.body, '/cr-fullstack') ||
        contains(github.event.comment.body, '/claude-review')) &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Detect review type
        id: detect
        run: |
          COMMENT="${{ github.event.comment.body }}"
          if echo "$COMMENT" | grep -q '/cr-fullstack'; then
            echo "skill=cr-fullstack" >> $GITHUB_OUTPUT
            echo "criteria=rules/fullstack.md (auto-detects and loads language-specific rules)" >> $GITHUB_OUTPUT
            echo "label=Fullstack" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q '/cr-node'; then
            echo "skill=cr-node" >> $GITHUB_OUTPUT
            echo "criteria=rules/node.md" >> $GITHUB_OUTPUT
            echo "label=Node.js" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q '/cr-python'; then
            echo "skill=cr-python" >> $GITHUB_OUTPUT
            echo "criteria=rules/python.md" >> $GITHUB_OUTPUT
            echo "label=Python" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q '/cr-general'; then
            echo "skill=cr-general" >> $GITHUB_OUTPUT
            echo "criteria=rules/general.md" >> $GITHUB_OUTPUT
            echo "label=General" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q '/cr-deps'; then
            echo "skill=cr-deps" >> $GITHUB_OUTPUT
            echo "criteria=rules/deps.md" >> $GITHUB_OUTPUT
            echo "label=Dependency Audit" >> $GITHUB_OUTPUT
          else
            echo "skill=cr-react" >> $GITHUB_OUTPUT
            echo "criteria=rules/react.md" >> $GITHUB_OUTPUT
            echo "label=React" >> $GITHUB_OUTPUT
          fi

      - name: Get PR head ref
        id: pr
        run: |
          PR_DATA=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefName,headRefOid --jq '{ref: .headRefName, sha: .headRefOid}')
          echo "ref=$(echo $PR_DATA | jq -r .ref)" >> $GITHUB_OUTPUT
          echo "sha=$(echo $PR_DATA | jq -r .sha)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Acknowledge review request
        run: |
          gh pr comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "🔍 Claude ${{ steps.detect.outputs.label }} Code Review started... I'll post findings shortly."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.ref }}

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "/cr"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}
            REVIEW TYPE: ${{ steps.detect.outputs.skill }}

            You are running in CI mode. Follow the autofix output format from `rules/autofix.md`.
            Follow the review criteria defined in `${{ steps.detect.outputs.criteria }}`.
            The PR branch is already checked out in the current working directory.

            ## Steps
            1. Read project config files (`package.json`, `pyproject.toml`, `requirements.txt`) for context-aware adjustments
            2. Get the PR diff using `gh pr diff ${{ github.event.issue.number }}`
            3. Run all review passes and filtering rules from the criteria file(s) against the diff and affected files
            4. Post a **main PR comment** summarizing all findings in a table (severity counts), with each finding listed as `[SEVERITY] file:line — description`. End the comment with:
               "To fix all issues below, reply with `/fix-all`"
            5. For each individual finding, post a **reply** to the main comment with full details: severity, file, line, issue description, reason, and suggested code fix. End each reply with:
               "To fix this issue, reply with `/fix`"
            6. If no issues found, post a single comment: "✅ No issues found — all review passes came back clean."
            7. Use `gh pr comment ${{ github.event.issue.number }}` to post comments
          claude_args: |
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),Bash(git blame:*),Bash(npm audit:*),Bash(npm outdated:*),Bash(pip-audit:*),Bash(pip list:*),Bash(cat:*),Bash(find:*),Bash(grep:*),Read"

      - name: Post review complete
        if: failure()
        run: |
          gh pr comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "❌ Claude ${{ steps.detect.outputs.label }} Code Review encountered an error. Check the workflow logs."
        env:
          GH_TOKEN: ${{ github.token }}

  fix:
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       (contains(github.event.comment.body, '/fix')) &&
       !contains(github.event.comment.body, '/cr-') &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Detect fix mode
        id: detect
        run: |
          COMMENT="${{ github.event.comment.body }}"
          if echo "$COMMENT" | grep -q '/fix-all'; then
            echo "mode=fix-all" >> $GITHUB_OUTPUT
          else
            echo "mode=fix" >> $GITHUB_OUTPUT
          fi

      - name: Get PR head ref
        id: pr
        run: |
          PR_DATA=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefName --jq '.headRefName')
          echo "ref=$PR_DATA" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: React to comment
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content='+1'
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Claude Autofix
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "/fix"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}
            FIX MODE: ${{ steps.detect.outputs.mode }}
            COMMENT ID: ${{ github.event.comment.id }}

            You are an autofix agent. A user replied with `/${{ steps.detect.outputs.mode }}` to a code review comment.

            ## If FIX MODE is `fix` (single fix)
            1. Read the comment thread to find the specific finding this `/fix` reply is for.
               Use: `gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments --jq '.[] | select(.id == ${{ github.event.comment.id }}) | .body'` to get the triggering comment context.
               Then read surrounding comments to find the finding comment this is replying to.
            2. Parse the finding: extract the file path, line number, and suggested code fix.
            3. Apply ONLY that single fix to the codebase.
            4. Run `git add -A && git commit -m "fix: apply review fix — <brief description>"` then `git push`.
            5. Reply to the comment confirming: "✅ Fix applied and pushed."

            ## If FIX MODE is `fix-all` (all fixes)
            1. Read ALL comments on this PR to find the code review thread.
               Use: `gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments --jq '.[].body'`
            2. Identify all finding comments (they contain `[CRITICAL]` or `[WARNING]` and a suggested fix).
            3. Apply ALL fixes to the codebase, CRITICAL first, then WARNING.
            4. Run `git add -A && git commit -m "fix: apply all code review fixes"` then `git push`.
            5. Reply confirming: "✅ All fixes applied and pushed. Applied N fixes (X critical, Y warning)."

            ## Rules
            - Do NOT modify files beyond the suggested fixes.
            - If a fix cannot be applied cleanly (e.g., code has changed), skip it and note which fixes were skipped.
            - Use `gh pr comment ${{ github.event.issue.number }}` to post confirmation replies.
          claude_args: |
            --allowedTools "Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(gh pr comment:*),Bash(gh api:*),Bash(cat:*),Bash(find:*),Bash(grep:*),Bash(sed:*),Read,Edit,Write"
