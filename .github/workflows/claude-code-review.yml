name: Claude Code Review

on:
  # pull_request:
  #   types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/claude-review') &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Get PR head ref
        id: pr
        run: |
          PR_DATA=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefName,headRefOid --jq '{ref: .headRefName, sha: .headRefOid}')
          echo "ref=$(echo $PR_DATA | jq -r .ref)" >> $GITHUB_OUTPUT
          echo "sha=$(echo $PR_DATA | jq -r .sha)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Acknowledge review request
        run: |
          gh pr comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "🔍 Claude Code Review started... I'll post findings shortly."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.ref }}

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "/claude-review"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}

            Follow the review criteria defined in `rules/pr-review-criteria.md`.
            The PR branch is already checked out in the current working directory.

            ## Steps
            1. Read `package.json` to check for React Compiler, Next.js, and design system deps (for context-aware adjustments)
            2. Get the PR diff using `gh pr diff`
            3. Run all 7 review passes and filtering rules from the criteria file against the diff and affected files
            4. Post ONLY inline review comments using `mcp__github_inline_comment__create_inline_comment` on the specific lines
            5. Include a suggested code fix in each inline comment when possible
            6. Do NOT post a top-level summary comment — the workflow posts a completion message automatically
            7. Do NOT use `gh pr comment` — you do not have permission to post arbitrary PR comments
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),Bash(git blame:*)"

      - name: Post review complete
        if: always()
        run: |
          gh pr comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "✅ Claude Code Review complete — any findings are posted as inline comments above."
        env:
          GH_TOKEN: ${{ github.token }}
