name: Claude Code Review

on:
  # pull_request:
  #   types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       (contains(github.event.comment.body, '/cr-react') ||
        contains(github.event.comment.body, '/cr-node') ||
        contains(github.event.comment.body, '/cr-python') ||
        contains(github.event.comment.body, '/cr-general') ||
        contains(github.event.comment.body, '/cr-deps') ||
        contains(github.event.comment.body, '/cr-fullstack') ||
        contains(github.event.comment.body, '/claude-review')) &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Detect review type
        id: detect
        run: |
          COMMENT="${{ github.event.comment.body }}"
          if echo "$COMMENT" | grep -q '/cr-fullstack'; then
            echo "skill=cr-fullstack" >> $GITHUB_OUTPUT
            echo "criteria=rules/fullstack.md (auto-detects and loads language-specific rules)" >> $GITHUB_OUTPUT
            echo "label=Fullstack" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q '/cr-node'; then
            echo "skill=cr-node" >> $GITHUB_OUTPUT
            echo "criteria=rules/node.md" >> $GITHUB_OUTPUT
            echo "label=Node.js" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q '/cr-python'; then
            echo "skill=cr-python" >> $GITHUB_OUTPUT
            echo "criteria=rules/python.md" >> $GITHUB_OUTPUT
            echo "label=Python" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q '/cr-general'; then
            echo "skill=cr-general" >> $GITHUB_OUTPUT
            echo "criteria=rules/general.md" >> $GITHUB_OUTPUT
            echo "label=General" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q '/cr-deps'; then
            echo "skill=cr-deps" >> $GITHUB_OUTPUT
            echo "criteria=rules/deps.md" >> $GITHUB_OUTPUT
            echo "label=Dependency Audit" >> $GITHUB_OUTPUT
          else
            echo "skill=cr-react" >> $GITHUB_OUTPUT
            echo "criteria=rules/react.md" >> $GITHUB_OUTPUT
            echo "label=React" >> $GITHUB_OUTPUT
          fi

      - name: Get PR head ref
        id: pr
        run: |
          PR_DATA=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefName,headRefOid --jq '{ref: .headRefName, sha: .headRefOid}')
          echo "ref=$(echo $PR_DATA | jq -r .ref)" >> $GITHUB_OUTPUT
          echo "sha=$(echo $PR_DATA | jq -r .sha)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Acknowledge review request
        run: |
          gh pr comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "🔍 Claude ${{ steps.detect.outputs.label }} Code Review started... I'll post findings shortly."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.ref }}

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "/cr-react"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}
            REVIEW TYPE: ${{ steps.detect.outputs.skill }}

            Follow the review criteria defined in `${{ steps.detect.outputs.criteria }}`.
            The PR branch is already checked out in the current working directory.

            ## Steps
            1. Read project config files (`package.json`, `pyproject.toml`, `requirements.txt`) for context-aware adjustments
            2. Get the PR diff using `gh pr diff`
            3. Run all review passes and filtering rules from the criteria file(s) against the diff and affected files
            4. Post ONLY inline review comments using `mcp__github_inline_comment__create_inline_comment` on the specific lines
            5. Include a suggested code fix in each inline comment when possible
            6. Do NOT post a top-level summary comment — the workflow posts a completion message automatically
            7. Do NOT use `gh pr comment` — you do not have permission to post arbitrary PR comments
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),Bash(git blame:*),Bash(npm audit:*),Bash(npm outdated:*),Bash(pip-audit:*),Bash(pip list:*)"

      - name: Post review complete
        if: always()
        run: |
          gh pr comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "✅ Claude ${{ steps.detect.outputs.label }} Code Review complete — any findings are posted as inline comments above."
        env:
          GH_TOKEN: ${{ github.token }}
